name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

# Отменяем предыдущие запуски для того же PR/branch (экономит минуты CI)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. Lint (ruff: быстрый линтер для Python, замена flake8+pyflakes+isort)
  # ---------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff check (нестрогий — текущий код имеет легаси warnings)
        # Политика: на 1-м этапе внедрения CI — lint отчитывается, но не валит build.
        # Новый код (в PR) должен соответствовать --select F,E,W.
        # Существующий тех-долг — issue #TBD, чистим постепенно.
        run: |
          echo "=== ruff check (warnings only) ==="
          ruff check app/ tests/ || echo "::warning::Ruff found issues (see above) — fix in follow-up"
          echo ""
          echo "=== ruff format --check (только отчёт) ==="
          ruff format --check --diff app/ tests/ || echo "::warning::Code needs formatting (run 'ruff format app/ tests/')"
          echo ""
          echo "=== ruff check (strict для нового кода — помоги будущим PR) ==="
          # Если меняли только эти файлы, проверяем строго
          if [ -n "${{ github.event.pull_request }}" ]; then
            CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '\.py$' || true)
            if [ -n "$CHANGED" ]; then
              echo "Strict check for changed files: $CHANGED"
              ruff check --select F,E,W $CHANGED
            fi
          fi

  # ---------------------------------------------------------------
  # 2. Secrets scan (gitleaks: ловит случайно закоммиченные ключи)
  # ---------------------------------------------------------------
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks требует full history

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # optional, для pro-features

  # ---------------------------------------------------------------
  # 3. Test (pytest на двух версиях Python, coverage только на 3.12)
  # ---------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (для soffice, ffmpeg в тестах)
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run pytest
        run: pytest -v --tb=short --maxfail=5
        env:
          # Чтобы тесты не зависели от реальных API-ключей
          MINIMAX_API_KEY: test-key-for-ci
          AUTOAI_API_KEY: test-key-for-ci
          WEB_SESSION_SECRET: test-secret-for-ci-only

      - name: Run pytest with coverage (только Python 3.12)
        if: matrix.python-version == '3.12'
        run: pytest -v --cov=app --cov-report=xml --cov-report=term --cov-fail-under=40
        env:
          MINIMAX_API_KEY: test-key-for-ci
          AUTOAI_API_KEY: test-key-for-ci
          WEB_SESSION_SECRET: test-secret-for-ci-only

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false   # не валим CI если codecov недоступен

  # ---------------------------------------------------------------
  # 4. Build check (импорт всех модулей — дешёвая проверка синтаксиса)
  # ---------------------------------------------------------------
  build-check:
    name: Build check (import smoke test)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Smoke-test imports
        run: |
          python -c "
          # Проверяем что все модули импортируются без ошибок
          from app import main, api, web_auth, storage, storage_templates, models
          from app import llm, asr, docx, prompts, templates, config
          print('✓ All core modules importable')
          from app.main import app
          print(f'✓ FastAPI app: {app.title} v{app.version}')
          print(f'✓ Routes: {len(app.routes)}')
          "
