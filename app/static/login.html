<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Protocol — Вход</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      padding: 1rem;
    }
    .login-card {
      max-width: 380px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    .login-card h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      color: #1e293b;
    }
    .login-card p {
      margin: 0 0 1.5rem;
      color: #64748b;
      font-size: 0.9rem;
    }
    .login-card label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .login-card input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary, #2563eb);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .login-card button {
      width: 100%;
      padding: 0.7rem;
      background: var(--primary, #2563eb);
      color: white;
      border: 0;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    .login-card button:hover { background: #1d4ed8; }
    .login-card button:disabled { background: #cbd5e1; cursor: not-allowed; }
    .login-status {
      margin-top: 1rem;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.2rem;
    }
    .login-status.ok { background: #dcfce7; color: #166534; }
    .login-status.err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎙️ Meeting Protocol</h1>
    <p>Введите логин и пароль для доступа</p>
    <form id="loginForm">
      <label for="username">Логин</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit" id="loginBtn">Войти</button>
    </form>
    <div class="login-status" id="loginStatus"></div>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const status = document.getElementById('loginStatus');

    function setStatus(text, kind) {
      status.textContent = text;
      status.className = 'login-status' + (kind ? ' ' + kind : '');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      setStatus('Проверка...');
      try {
        const r = await fetch('/web/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
          credentials: 'include',
        });
        if (r.ok) {
          setStatus('OK. Перенаправляем...', 'ok');
          setTimeout(() => { window.location.href = '/'; }, 300);
        } else {
          const data = await r.json().catch(() => ({}));
          setStatus(data.detail || 'Ошибка входа', 'err');
          btn.disabled = false;
        }
      } catch (err) {
        setStatus('Сетевая ошибка: ' + err.message, 'err');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
